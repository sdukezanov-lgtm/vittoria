server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: любые маршруты отдают index.html (клиентский роутинг).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэш статики.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
