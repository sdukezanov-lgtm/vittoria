name: VittoriaClient
options:
  bundleIdPrefix: app.vittoria
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"

targets:
  VittoriaClient:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: VittoriaClient
    info:
      path: VittoriaClient/Info.plist
      properties:
        CFBundleDisplayName: Vittoria
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        LSApplicationQueriesSchemes:
          - tel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.vittoria.client
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: VittoriaClient/Info.plist
        CODE_SIGN_STYLE: Automatic
